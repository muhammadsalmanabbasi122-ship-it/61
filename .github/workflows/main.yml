name: Build GhostType Pro APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug + Signed Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        working-directory: ghosttype-pro
        run: chmod +x gradlew || true

      - name: Generate Gradle wrapper if missing
        working-directory: ghosttype-pro
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.7
          fi
          chmod +x gradlew

      # ============== DEBUG APK (always built) ==============
      - name: Build Debug APK
        working-directory: ghosttype-pro
        run: |
          ./gradlew assembleDebug --stacktrace 2>&1 | tee /tmp/gradle_debug.log
          EXITCODE=${PIPESTATUS[0]}
          echo ""
          echo "===== KOTLIN COMPILATION ERRORS (if any) ====="
          grep -n "e:" /tmp/gradle_debug.log | head -30 || true
          echo "=============================================="
          exit $EXITCODE

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: GhostTypePro-debug-apk
          path: ghosttype-pro/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      # ============== SIGNED RELEASE APK ==============
      # Decodes KEYSTORE_BASE64 secret into a real .jks file inside the
      # repo (kept for the Gradle build only â€” the runner is wiped after
      # the job). Then exports the four signing env vars that
      # app/build.gradle.kts reads. If any secret is missing the release
      # build still runs but is unsigned; the upload step warns instead
      # of failing so the workflow does not block on missing secrets.
      - name: Decode release keystore
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        env:
          HAS_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 != '' }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        working-directory: ghosttype-pro
        run: |
          mkdir -p keystore
          echo "$KEYSTORE_BASE64" | base64 -d > keystore/ghosttype-release.jks
          ls -la keystore/

      - name: Build Signed Release APK
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        working-directory: ghosttype-pro
        env:
          HAS_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 != '' }}
          KEYSTORE_PATH: keystore/ghosttype-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Build Unsigned Release APK (no secrets fallback)
        if: ${{ env.HAS_KEYSTORE != 'true' }}
        env:
          HAS_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 != '' }}
        working-directory: ghosttype-pro
        run: ./gradlew assembleRelease --stacktrace || true

      - name: Upload Release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: GhostTypePro-release-apk
          path: ghosttype-pro/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

      - name: Cleanup keystore
        if: ${{ always() && env.HAS_KEYSTORE == 'true' }}
        env:
          HAS_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 != '' }}
        working-directory: ghosttype-pro
        run: rm -f keystore/ghosttype-release.jks

        
